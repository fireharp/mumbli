name: Validate PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            chore
            test
            ci
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must follow conventional commits: type: description (e.g. feat: Add new feature)"
